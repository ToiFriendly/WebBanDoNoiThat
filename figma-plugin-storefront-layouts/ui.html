<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Storefront Layout Generator</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #161312;
        --text: #f7efe6;
        --muted: rgba(247, 239, 230, 0.72);
        --line: rgba(255, 255, 255, 0.08);
        --accent: #d87b38;
        --accent-2: #8c5f3f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font: 13px/1.45 Inter, system-ui, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(216, 123, 56, 0.28), transparent 34%),
          radial-gradient(circle at bottom right, rgba(140, 95, 63, 0.24), transparent 30%),
          linear-gradient(160deg, #171311 0%, #1f1917 100%);
      }

      main {
        padding: 18px;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 20px;
        padding: 18px;
        background: rgba(27, 22, 20, 0.92);
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.24);
      }

      h1 {
        margin: 0;
        font-size: 18px;
      }

      p {
        margin: 0;
      }

      .intro {
        margin-top: 10px;
        color: var(--muted);
      }

      .section {
        margin-top: 18px;
      }

      .label {
        display: block;
        margin-bottom: 8px;
        font-weight: 700;
      }

      select,
      textarea,
      input[type="range"] {
        width: 100%;
      }

      select,
      textarea {
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 14px;
        padding: 10px 12px;
        color: var(--text);
        background: rgba(255, 255, 255, 0.06);
        outline: none;
      }

      textarea {
        min-height: 154px;
        resize: vertical;
        font: 12px/1.55 ui-monospace, SFMono-Regular, Consolas, monospace;
      }

      .scale-row {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .scale-value {
        min-width: 48px;
        text-align: right;
        font-weight: 700;
        color: #ffe6d2;
      }

      .hint {
        margin-top: 8px;
        color: var(--muted);
        font-size: 12px;
      }

      .actions {
        display: flex;
        gap: 10px;
        margin-top: 18px;
      }

      button {
        appearance: none;
        border: 0;
        border-radius: 999px;
        padding: 11px 16px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      .primary {
        color: #fff8f0;
        background: linear-gradient(135deg, var(--accent-2), var(--accent));
      }

      .secondary {
        color: #f6eadf;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .status {
        margin-top: 14px;
        min-height: 18px;
        color: #ffd8bb;
      }

      .token {
        margin-top: 10px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
        color: #f4dcc6;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="panel">
        <h1>Storefront Layout Generator</h1>
        <p class="intro">
          Tao nhanh layout Figma cho gio hang, lich su don hang, theo doi don hang va cong thanh toan MoMo.
        </p>

        <div class="token">Warm beige UI - Auto layout - Sample data</div>

        <div class="section">
          <label class="label" for="screen">Man hinh can ve</label>
          <select id="screen">
            <option value="all">Tat ca 4 man hinh</option>
            <option value="cart">Gio hang</option>
            <option value="history">Lich su don hang</option>
            <option value="tracking">Theo doi don hang</option>
            <option value="payment">Thanh toan MoMo</option>
          </select>
        </div>

        <div class="section">
          <label class="label" for="scale">Ti le</label>
          <div class="scale-row">
            <input id="scale" type="range" min="70" max="120" value="100" />
            <div id="scale-value" class="scale-value">100%</div>
          </div>
          <div class="hint">Dung 90% neu muon canvas gon hon.</div>
        </div>

        <div class="section">
          <label class="label" for="overrides">JSON overrides tuy chon</label>
          <textarea
            id="overrides"
            spellcheck="false"
            placeholder='Vi du cho mode man hinh don:
{
  "assetBaseUrl": "http://localhost:5000",
  "title": "Gio hang uu tien",
  "items": [
    {
      "name": "Sofa Mellow",
      "image": "/uploads/products/sofa-mellow.jpg",
      "price": "18.900.000d",
      "quantity": 2
    }
  ]
}

Vi du cho mode "Tat ca 3 man hinh":
{
  "assetBaseUrl": "http://localhost:5000",
  "cart": { "title": "Gio hang moi" },
  "history": { "orders": [] },
  "tracking": { "selectedCode": "ORD-2026-021" },
  "payment": { "amount": "11.799.999đ" }
}'></textarea>
          <div class="hint">
            Mang se duoc thay the toan bo, object se duoc merge de ban tinh chinh nhanh content mau.
          </div>
        </div>

        <div class="actions">
          <button class="primary" id="generate">Generate</button>
          <button class="secondary" id="cancel" type="button">Dong</button>
        </div>

        <div class="status" id="status"></div>
      </div>
    </main>

    <script>
      const screen = document.getElementById("screen");
      const scale = document.getElementById("scale");
      const scaleValue = document.getElementById("scale-value");
      const overrides = document.getElementById("overrides");
      const status = document.getElementById("status");

      scale.addEventListener("input", () => {
        scaleValue.textContent = `${scale.value}%`;
      });

      document.getElementById("generate").addEventListener("click", () => {
        let parsedOverrides = null;

        if (overrides.value.trim()) {
          try {
            parsedOverrides = JSON.parse(overrides.value);
          } catch (error) {
            status.textContent = "JSON overrides chua hop le. Kiem tra dau phay, ngoac va dau nhay.";
            return;
          }
        }

        status.textContent = "Dang tao layout...";

        parent.postMessage(
          {
            pluginMessage: {
              type: "generate",
              screen: screen.value,
              scale: Number(scale.value) / 100,
              overrides: parsedOverrides,
            },
          },
          "*",
        );
      });

      document.getElementById("cancel").addEventListener("click", () => {
        parent.postMessage({ pluginMessage: { type: "cancel" } }, "*");
      });

      window.onmessage = (event) => {
        const { pluginMessage } = event.data || {};

        if (!pluginMessage) {
          return;
        }

        if (pluginMessage.type === "status") {
          status.textContent = pluginMessage.message || "";
        }
      };
    </script>
  </body>
</html>
