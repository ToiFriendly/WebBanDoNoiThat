# ============================================
# Docker Compose cho Production Deployment
# ============================================

services:
  # Backend API (Node.js/Express)
  backend:
    image: ${DOCKERHUB_USERNAME}/webbandonoithat-backend:${IMAGE_TAG:-latest}
    container_name: noithat-backend
    restart: always
    expose:
      - "5000"
    env_file:
      - ./backend/.env
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Frontend (React/Vite + Nginx)
  frontend:
    image: ${DOCKERHUB_USERNAME}/webbandonoithat-frontend:${IMAGE_TAG:-latest}
    container_name: noithat-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
