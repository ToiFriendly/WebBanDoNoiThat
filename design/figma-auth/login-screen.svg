<svg width="1440" height="1200" viewBox="0 0 1440 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="160" y1="80" x2="1300" y2="1120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F6EFE4"/>
      <stop offset="0.45" stop-color="#EFE4D3"/>
      <stop offset="1" stop-color="#F9F5EE"/>
    </linearGradient>
    <linearGradient id="panel" x1="100" y1="80" x2="680" y2="1080" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFCF7" stop-opacity="0.86"/>
      <stop offset="1" stop-color="#F5EBDE" stop-opacity="0.72"/>
    </linearGradient>
    <linearGradient id="softCard" x1="780" y1="210" x2="1270" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFAF5"/>
      <stop offset="1" stop-color="#F5EBDE" stop-opacity="0.84"/>
    </linearGradient>
    <linearGradient id="cta" x1="760" y1="760" x2="1320" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8C5F3F"/>
      <stop offset="1" stop-color="#D87B38"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1440" height="1200" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="40" flood-color="#4C3324" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1440" height="1200" rx="0" fill="url(#bg)"/>
  <ellipse cx="120" cy="120" rx="170" ry="170" fill="#FAC06A" fill-opacity="0.28"/>
  <ellipse cx="1310" cy="1040" rx="220" ry="200" fill="#A16207" fill-opacity="0.10"/>

  <g filter="url(#shadow)">
    <rect x="44" y="44" width="610" height="1112" rx="36" fill="url(#panel)" stroke="#D8C4AE"/>
    <rect x="698" y="102" width="698" height="980" rx="36" fill="#FFFCF7" fill-opacity="0.9" stroke="#D8C4AE"/>
  </g>

  <text x="94" y="122" fill="#8C5F3F" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="6">TRO LAI BO SUU TAP</text>
  <text x="94" y="236" fill="#2F241F" font-family="Segoe UI, Arial, sans-serif" font-size="84" font-weight="700" letter-spacing="-3">
    <tspan x="94" dy="0">Dang nhap de</tspan>
    <tspan x="94" dy="90">tiep tuc hoan</tspan>
    <tspan x="94" dy="90">thien khong</tspan>
    <tspan x="94" dy="90">gian song cua</tspan>
    <tspan x="94" dy="90">ban.</tspan>
  </text>
  <text x="94" y="748" fill="#5D483F" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="500">
    <tspan x="94" dy="0">Layout auth giu tong mau nau kem, bo cuc sang am</tspan>
    <tspan x="94" dy="44">va uu tien luong thao tac nhanh hon cho form dang nhap.</tspan>
  </text>

  <rect x="94" y="844" width="470" height="120" rx="24" fill="#FFFFFF" fill-opacity="0.7" stroke="#D8C4AE"/>
  <text x="122" y="900" fill="#2F241F" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Dang nhap nhanh hon</text>
  <text x="122" y="952" fill="#6A544A" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="500">
    <tspan x="122" dy="0">Login thuong va Google dang nam trong</tspan>
    <tspan x="122" dy="32">mot form gon, ro, de thao tac.</tspan>
  </text>

  <rect x="94" y="988" width="470" height="120" rx="24" fill="#FFFFFF" fill-opacity="0.66" stroke="#D8C4AE"/>
  <text x="122" y="1044" fill="#2F241F" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Google Sign-In hien ro</text>
  <text x="122" y="1096" fill="#6A544A" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="500">
    <tspan x="122" dy="0">Co vung hien thi rieng cho nut Google va</tspan>
    <tspan x="122" dy="32">khong bi cat boi panel truot.</tspan>
  </text>

  <text x="748" y="168" fill="#8C5F3F" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="4">TAI KHOAN</text>
  <text x="748" y="236" fill="#2F241F" font-family="Segoe UI, Arial, sans-serif" font-size="56" font-weight="700">Dang nhap</text>
  <rect x="1186" y="126" width="162" height="56" rx="28" fill="#FFFFFF" fill-opacity="0.74" stroke="#D8C4AE"/>
  <text x="1211" y="162" fill="#6A544A" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Ve trang chu</text>

  <rect x="748" y="284" width="598" height="164" rx="26" fill="url(#softCard)" stroke="#D8C4AE"/>
  <text x="784" y="334" fill="#8C5F3F" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="4">DANG NHAP NHANH</text>
  <text x="784" y="390" fill="#2F241F" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">Chao mung ban quay lai</text>
  <text x="784" y="438" fill="#6A544A" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="500">
    <tspan x="784" dy="0">Dien email hoac username, sau do chon cach dang nhap phu hop.</tspan>
    <tspan x="784" dy="30">Neu quen mat khau, ban co the dat lai bang OTP.</tspan>
  </text>

  <text x="748" y="520" fill="#5F493D" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Email hoac ten dang nhap</text>
  <rect x="748" y="540" width="598" height="64" rx="22" fill="#FFFFFF" fill-opacity="0.9" stroke="#D8C4AE"/>
  <text x="780" y="580" fill="#A49A93" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">Nhap email hoac username</text>

  <text x="748" y="668" fill="#5F493D" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Mat khau</text>
  <rect x="748" y="688" width="598" height="64" rx="22" fill="#FFFFFF" fill-opacity="0.9" stroke="#D8C4AE"/>
  <text x="780" y="728" fill="#A49A93" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">Nhap mat khau</text>

  <text x="748" y="804" fill="#7A5B47" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="500">Dang nhap bang email, username hoac Google.</text>
  <text x="1168" y="804" fill="#8C5F3F" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Quen mat khau?</text>
  <text x="748" y="840" fill="#8C5F3F" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Chua co tai khoan? Tao tai khoan moi</text>

  <rect x="748" y="874" width="598" height="70" rx="22" fill="url(#cta)"/>
  <text x="1032" y="919" text-anchor="middle" fill="#FFFAF4" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Dang nhap ngay</text>

  <line x1="748" y1="986" x2="930" y2="986" stroke="#D8C4AE"/>
  <line x1="1164" y1="986" x2="1346" y2="986" stroke="#D8C4AE"/>
  <text x="954" y="992" fill="#866B5B" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="500">hoac tiep tuc voi Google</text>

  <rect x="748" y="1014" width="598" height="88" rx="24" fill="#FFFAF5" stroke="#D8C4AE"/>
  <rect x="905" y="1038" width="284" height="40" rx="20" fill="#FFFFFF" stroke="#D8C4AE"/>
  <circle cx="932" cy="1058" r="10" fill="#4285F4"/>
  <circle cx="932" cy="1058" r="5" fill="#FFFFFF"/>
  <text x="1052" y="1064" text-anchor="middle" fill="#2F241F" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">Sign in with Google</text>
</svg>
