<svg width="1440" height="1200" viewBox="0 0 1440 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="110" y1="60" x2="1320" y2="1120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F6EFE4"/>
      <stop offset="0.48" stop-color="#EFE4D3"/>
      <stop offset="1" stop-color="#F9F5EE"/>
    </linearGradient>
    <linearGradient id="panel" x1="80" y1="70" x2="670" y2="1090" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFCF7" stop-opacity="0.86"/>
      <stop offset="1" stop-color="#F5EBDE" stop-opacity="0.72"/>
    </linearGradient>
    <linearGradient id="softCard" x1="770" y1="280" x2="1340" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFAF5"/>
      <stop offset="1" stop-color="#F5EBDE" stop-opacity="0.84"/>
    </linearGradient>
    <linearGradient id="cta" x1="760" y1="998" x2="1048" y2="998" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8C5F3F"/>
      <stop offset="1" stop-color="#D87B38"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1440" height="1200" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="40" flood-color="#4C3324" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1440" height="1200" fill="url(#bg)"/>
  <ellipse cx="118" cy="118" rx="170" ry="170" fill="#FAC06A" fill-opacity="0.25"/>
  <ellipse cx="1296" cy="1040" rx="220" ry="200" fill="#A16207" fill-opacity="0.10"/>

  <g filter="url(#shadow)">
    <rect x="44" y="44" width="610" height="1112" rx="36" fill="url(#panel)" stroke="#D8C4AE"/>
    <rect x="698" y="94" width="706" height="1010" rx="36" fill="#FFFCF7" fill-opacity="0.9" stroke="#D8C4AE"/>
  </g>

  <text x="94" y="122" fill="#8C5F3F" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="6">KHOI TAO LAI MAT KHAU</text>
  <text x="94" y="236" fill="#2F241F" font-family="Segoe UI, Arial, sans-serif" font-size="74" font-weight="700" letter-spacing="-3">
    <tspan x="94" dy="0">Nhan OTP va</tspan>
    <tspan x="94" dy="84">dat lai mat</tspan>
    <tspan x="94" dy="84">khau trong</tspan>
    <tspan x="94" dy="84">mot luong</tspan>
    <tspan x="94" dy="84">ro rang.</tspan>
  </text>
  <text x="94" y="734" fill="#5D483F" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="500">
    <tspan x="94" dy="0">Forgotpass giu cung shell voi login va register,</tspan>
    <tspan x="94" dy="44">nhung bo cuc uu tien tung buoc OTP ro rang hon.</tspan>
  </text>

  <rect x="94" y="850" width="470" height="120" rx="24" fill="#FFFFFF" fill-opacity="0.70" stroke="#D8C4AE"/>
  <text x="122" y="906" fill="#2F241F" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Buoc 1: nhan OTP</text>
  <text x="122" y="956" fill="#6A544A" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="500">
    <tspan x="122" dy="0">Nhap email dang ky de he thong gui ma</tspan>
    <tspan x="122" dy="32">xac minh ve hop thu.</tspan>
  </text>

  <rect x="94" y="992" width="470" height="120" rx="24" fill="#FFFFFF" fill-opacity="0.66" stroke="#D8C4AE"/>
  <text x="122" y="1048" fill="#2F241F" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Buoc 2: tao mat khau moi</text>
  <text x="122" y="1098" fill="#6A544A" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="500">
    <tspan x="122" dy="0">Nhap OTP, mat khau moi va xac nhan de</tspan>
    <tspan x="122" dy="32">hoan tat luong khoi phuc tai khoan.</tspan>
  </text>

  <text x="748" y="160" fill="#8C5F3F" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="4">FORGOTPASS</text>
  <text x="748" y="228" fill="#2F241F" font-family="Segoe UI, Arial, sans-serif" font-size="56" font-weight="700">Nhap OTP</text>
  <rect x="1186" y="118" width="162" height="56" rx="28" fill="#FFFFFF" fill-opacity="0.74" stroke="#D8C4AE"/>
  <text x="1211" y="154" fill="#6A544A" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Ve dang nhap</text>

  <rect x="748" y="276" width="606" height="58" rx="29" fill="#F2E7D7"/>
  <rect x="752" y="280" width="194" height="50" rx="25" fill="#FFFFFF"/>
  <rect x="954" y="280" width="194" height="50" rx="25" fill="#2F241F"/>
  <rect x="1156" y="280" width="194" height="50" rx="25" fill="#FFFFFF"/>
  <text x="849" y="311" text-anchor="middle" fill="#7A5B47" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Email</text>
  <text x="1051" y="311" text-anchor="middle" fill="#FFF8F2" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">OTP</text>
  <text x="1253" y="311" text-anchor="middle" fill="#7A5B47" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Xong</text>

  <rect x="748" y="366" width="606" height="156" rx="26" fill="url(#softCard)" stroke="#D8C4AE"/>
  <text x="784" y="418" fill="#8C5F3F" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="4">DAT LAI MAT KHAU</text>
  <text x="784" y="472" fill="#2F241F" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">Nhap OTP va mat khau moi</text>
  <text x="784" y="512" fill="#6A544A" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="500">OTP gom 6 chu so da duoc gui toi email cua ban va co hieu luc trong 5 phut.</text>

  <text x="748" y="592" fill="#5F493D" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Ma OTP</text>
  <rect x="748" y="612" width="606" height="62" rx="22" fill="#FFFFFF" fill-opacity="0.9" stroke="#D8C4AE"/>
  <text x="780" y="651" fill="#A49A93" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">Nhap ma OTP gom 6 chu so</text>

  <text x="748" y="736" fill="#5F493D" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Mat khau moi</text>
  <rect x="748" y="756" width="606" height="62" rx="22" fill="#FFFFFF" fill-opacity="0.9" stroke="#D8C4AE"/>
  <text x="780" y="795" fill="#A49A93" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">Nhap mat khau moi</text>

  <text x="748" y="880" fill="#5F493D" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Xac nhan mat khau moi</text>
  <rect x="748" y="900" width="606" height="62" rx="22" fill="#FFFFFF" fill-opacity="0.9" stroke="#D8C4AE"/>
  <text x="780" y="939" fill="#A49A93" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">Nhap lai mat khau moi</text>

  <rect x="748" y="992" width="292" height="70" rx="22" fill="url(#cta)"/>
  <text x="894" y="1037" text-anchor="middle" fill="#FFFAF4" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Dat lai mat khau</text>

  <rect x="1062" y="992" width="292" height="70" rx="22" fill="#FFFFFF" fill-opacity="0.82" stroke="#D8C4AE"/>
  <text x="1208" y="1037" text-anchor="middle" fill="#6A544A" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Gui lai OTP</text>

  <rect x="748" y="1080" width="606" height="58" rx="22" fill="#F3E5D7"/>
  <text x="1051" y="1117" text-anchor="middle" fill="#5A4336" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Thu lai tu dau</text>
</svg>
