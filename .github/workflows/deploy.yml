name: CI/CD Deploy to Ubuntu VPS

on:
  push:
    branches:
      - main
      - feature/CICD
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

env:
  APP_DIR: /root/webbandonoithat
  BACKEND_IMAGE_NAME: webbandonoithat-backend
  FRONTEND_IMAGE_NAME: webbandonoithat-frontend

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set Docker image names
        run: |
          DOCKER_USER="$(echo "${{ secrets.DOCKERHUB_USERNAME }}" | xargs)"

          if [ -z "$DOCKER_USER" ]; then
            echo "Missing DOCKERHUB_USERNAME secret." >&2
            exit 1
          fi

          echo "DOCKER_USER=$DOCKER_USER" >> "$GITHUB_ENV"
          echo "BACKEND_IMAGE=$DOCKER_USER/${{ env.BACKEND_IMAGE_NAME }}" >> "$GITHUB_ENV"
          echo "FRONTEND_IMAGE=$DOCKER_USER/${{ env.FRONTEND_IMAGE_NAME }}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Ubuntu VPS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Validate deployment secrets
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_USERNAME: ${{ secrets.SERVER_USERNAME }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          BACKEND_ENV_FILE: ${{ secrets.BACKEND_ENV_FILE }}
        run: |
          set -eu

          trim_secret() {
            printf '%s' "$1" | tr -d '\r' | xargs
          }

          require_secret() {
            local name="$1"
            local value="$2"

            if [ -z "$value" ]; then
              echo "Missing required secret: $name" >&2
              exit 1
            fi
          }

          SERVER_HOST_RAW="$(trim_secret "${SERVER_HOST}")"
          # Strip port if user accidentally included it in SERVER_HOST (e.g. 139.99.92.118:22)
          SERVER_HOST_CLEAN="${SERVER_HOST_RAW%:*}"
          SERVER_USERNAME_CLEAN="$(trim_secret "${SERVER_USERNAME}")"
          SERVER_PORT_CLEAN="$(trim_secret "${SERVER_PORT:-22}")"
          DOCKERHUB_USERNAME_CLEAN="$(trim_secret "${DOCKERHUB_USERNAME}")"

          require_secret "SERVER_HOST" "${SERVER_HOST_CLEAN}"
          require_secret "SERVER_USERNAME" "${SERVER_USERNAME_CLEAN}"
          require_secret "SERVER_PASSWORD" "${SERVER_PASSWORD}"
          require_secret "DOCKERHUB_USERNAME" "${DOCKERHUB_USERNAME_CLEAN}"
          require_secret "DOCKERHUB_TOKEN" "${DOCKERHUB_TOKEN}"

          if [ -z "${SERVER_PORT_CLEAN}" ]; then
            SERVER_PORT_CLEAN="22"
          fi

          case "${SERVER_PORT_CLEAN}" in
            *[!0-9]*)
              echo "SERVER_PORT must be numeric. Current value is invalid." >&2
              exit 1
              ;;
          esac

          if [ "${SERVER_PORT_CLEAN}" -lt 1 ] || [ "${SERVER_PORT_CLEAN}" -gt 65535 ]; then
            echo "SERVER_PORT must be between 1 and 65535." >&2
            exit 1
          fi

          if [ -z "$(printf '%s' "${BACKEND_ENV_FILE}" | tr -d '\r\n[:space:]')" ]; then
            echo "Missing required secret: BACKEND_ENV_FILE" >&2
            exit 1
          fi

          echo "SERVER_HOST_CLEAN=${SERVER_HOST_CLEAN}" >> "$GITHUB_ENV"
          echo "SERVER_USERNAME_CLEAN=${SERVER_USERNAME_CLEAN}" >> "$GITHUB_ENV"
          echo "SERVER_PORT_CLEAN=${SERVER_PORT_CLEAN}" >> "$GITHUB_ENV"
          echo "DOCKERHUB_USERNAME_CLEAN=${DOCKERHUB_USERNAME_CLEAN}" >> "$GITHUB_ENV"

      - name: Install SSH tools
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Prepare deployment bundle
        env:
          DOCKERHUB_USERNAME: ${{ env.DOCKERHUB_USERNAME_CLEAN }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          BACKEND_ENV_FILE: ${{ secrets.BACKEND_ENV_FILE }}
        run: |
          set -eu
          rm -rf .deploy .deploy.tar.gz
          mkdir -p .deploy/backend

          cp docker-compose.yml .deploy/docker-compose.yml

          cat > .deploy/.env <<EOF
          DOCKERHUB_USERNAME=${DOCKERHUB_USERNAME}
          IMAGE_TAG=${GITHUB_SHA}
          EOF

          printf '%s' "${BACKEND_ENV_FILE}" > .deploy/backend/.env
          printf '%s' "${DOCKERHUB_TOKEN}" > .deploy/dockerhub.token

          tar -czf .deploy.tar.gz -C .deploy .

      - name: Upload deployment bundle
        env:
          SERVER_HOST: ${{ env.SERVER_HOST_CLEAN }}
          SERVER_PORT: ${{ env.SERVER_PORT_CLEAN }}
          SERVER_USERNAME: ${{ env.SERVER_USERNAME_CLEAN }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
        run: |
          set -eu
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

          sshpass -p "${SERVER_PASSWORD}" ssh ${SSH_OPTS} -p "${SERVER_PORT}" "${SERVER_USERNAME}@${SERVER_HOST}" \
            "mkdir -p '${APP_DIR}' '${APP_DIR}/backend'"

          sshpass -p "${SERVER_PASSWORD}" scp ${SSH_OPTS} -P "${SERVER_PORT}" .deploy.tar.gz \
            "${SERVER_USERNAME}@${SERVER_HOST}:/tmp/webbandonoithat-deploy.tar.gz"

          sshpass -p "${SERVER_PASSWORD}" ssh ${SSH_OPTS} -p "${SERVER_PORT}" "${SERVER_USERNAME}@${SERVER_HOST}" \
            "tar -xzf /tmp/webbandonoithat-deploy.tar.gz -C '${APP_DIR}' && rm -f /tmp/webbandonoithat-deploy.tar.gz"

      - name: Ensure Docker exists on VPS
        env:
          SERVER_HOST: ${{ env.SERVER_HOST_CLEAN }}
          SERVER_PORT: ${{ env.SERVER_PORT_CLEAN }}
          SERVER_USERNAME: ${{ env.SERVER_USERNAME_CLEAN }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
        run: |
          set -eu
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

          sshpass -p "${SERVER_PASSWORD}" ssh ${SSH_OPTS} -p "${SERVER_PORT}" "${SERVER_USERNAME}@${SERVER_HOST}" '
            set -eu

            if command -v docker >/dev/null 2>&1 && docker compose version >/dev/null 2>&1; then
              exit 0
            fi

            if command -v sudo >/dev/null 2>&1 && [ "$(id -u)" -ne 0 ]; then
              SUDO="sudo"
            else
              SUDO=""
            fi

            $SUDO apt-get update
            $SUDO apt-get install -y ca-certificates curl gnupg
            $SUDO install -m 0755 -d /etc/apt/keyrings

            if [ ! -f /etc/apt/keyrings/docker.gpg ]; then
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | $SUDO gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              $SUDO chmod a+r /etc/apt/keyrings/docker.gpg
            fi

            CODENAME=$(. /etc/os-release && echo "$VERSION_CODENAME")

            echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu ${CODENAME} stable" \
              | $SUDO tee /etc/apt/sources.list.d/docker.list >/dev/null

            $SUDO apt-get update
            $SUDO apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
            $SUDO systemctl enable docker
            $SUDO systemctl start docker
          '

      - name: Deploy containers
        env:
          SERVER_HOST: ${{ env.SERVER_HOST_CLEAN }}
          SERVER_PORT: ${{ env.SERVER_PORT_CLEAN }}
          SERVER_USERNAME: ${{ env.SERVER_USERNAME_CLEAN }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
          DOCKERHUB_USERNAME: ${{ env.DOCKERHUB_USERNAME_CLEAN }}
        run: |
          set -eu
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

          sshpass -p "${SERVER_PASSWORD}" ssh ${SSH_OPTS} -p "${SERVER_PORT}" "${SERVER_USERNAME}@${SERVER_HOST}" \
            "docker login -u '${DOCKERHUB_USERNAME}' --password-stdin" < .deploy/dockerhub.token

          sshpass -p "${SERVER_PASSWORD}" ssh ${SSH_OPTS} -p "${SERVER_PORT}" "${SERVER_USERNAME}@${SERVER_HOST}" \
            "set -eu; cd '${APP_DIR}'; docker compose pull; docker compose up -d --remove-orphans; docker image prune -af; docker compose ps"

      - name: Print backend logs on failure
        if: failure()
        env:
          SERVER_HOST: ${{ env.SERVER_HOST_CLEAN }}
          SERVER_PORT: ${{ env.SERVER_PORT_CLEAN }}
          SERVER_USERNAME: ${{ env.SERVER_USERNAME_CLEAN }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
        run: |
          set -eu
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

          sshpass -p "${SERVER_PASSWORD}" ssh ${SSH_OPTS} -p "${SERVER_PORT}" "${SERVER_USERNAME}@${SERVER_HOST}" \
            "cd '${APP_DIR}' && docker compose ps && echo '--- backend logs ---' && docker compose logs --tail=200 backend && echo '--- frontend logs ---' && docker compose logs --tail=100 frontend"
