name: CI/CD Deploy to Ubuntu VPS

on:
  push:
    branches:
      - main
      - feature/CICD
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

env:
  APP_DIR: /root/webbandonoithat
  BACKEND_IMAGE_NAME: webbandonoithat-backend
  FRONTEND_IMAGE_NAME: webbandonoithat-frontend

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set Docker image names
        run: |
          DOCKER_USER="$(echo "${{ secrets.DOCKERHUB_USERNAME }}" | xargs)"

          if [ -z "$DOCKER_USER" ]; then
            echo "Missing DOCKERHUB_USERNAME secret." >&2
            exit 1
          fi

          echo "DOCKER_USER=$DOCKER_USER" >> "$GITHUB_ENV"
          echo "BACKEND_IMAGE=$DOCKER_USER/${{ env.BACKEND_IMAGE_NAME }}" >> "$GITHUB_ENV"
          echo "FRONTEND_IMAGE=$DOCKER_USER/${{ env.FRONTEND_IMAGE_NAME }}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Ubuntu VPS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install SSH tools
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Prepare deployment bundle
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          BACKEND_ENV_FILE: ${{ secrets.BACKEND_ENV_FILE }}
        run: |
          set -eu
          rm -rf .deploy .deploy.tar.gz
          mkdir -p .deploy/backend

          cp docker-compose.yml .deploy/docker-compose.yml

          cat > .deploy/.env <<EOF
          DOCKERHUB_USERNAME=${DOCKERHUB_USERNAME}
          IMAGE_TAG=${GITHUB_SHA}
          EOF

          printf '%s' "${BACKEND_ENV_FILE}" > .deploy/backend/.env
          printf '%s' "${DOCKERHUB_TOKEN}" > .deploy/dockerhub.token

          tar -czf .deploy.tar.gz -C .deploy .

      - name: Upload deployment bundle
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_USERNAME: ${{ secrets.SERVER_USERNAME }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
        run: |
          set -eu
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

          sshpass -p "${SERVER_PASSWORD}" ssh ${SSH_OPTS} -p "${SERVER_PORT}" "${SERVER_USERNAME}@${SERVER_HOST}" \
            "mkdir -p '${APP_DIR}' '${APP_DIR}/backend'"

          sshpass -p "${SERVER_PASSWORD}" scp ${SSH_OPTS} -P "${SERVER_PORT}" .deploy.tar.gz \
            "${SERVER_USERNAME}@${SERVER_HOST}:/tmp/webbandonoithat-deploy.tar.gz"

          sshpass -p "${SERVER_PASSWORD}" ssh ${SSH_OPTS} -p "${SERVER_PORT}" "${SERVER_USERNAME}@${SERVER_HOST}" \
            "tar -xzf /tmp/webbandonoithat-deploy.tar.gz -C '${APP_DIR}' && rm -f /tmp/webbandonoithat-deploy.tar.gz"

      - name: Deploy containers
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_USERNAME: ${{ secrets.SERVER_USERNAME }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          set -eu
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

          sshpass -p "${SERVER_PASSWORD}" ssh ${SSH_OPTS} -p "${SERVER_PORT}" "${SERVER_USERNAME}@${SERVER_HOST}" \
            "docker login -u '${DOCKERHUB_USERNAME}' --password-stdin" < .deploy/dockerhub.token

          sshpass -p "${SERVER_PASSWORD}" ssh ${SSH_OPTS} -p "${SERVER_PORT}" "${SERVER_USERNAME}@${SERVER_HOST}" \
            "set -eu; cd '${APP_DIR}'; docker compose pull; docker compose up -d --remove-orphans; docker image prune -af; docker compose ps"
