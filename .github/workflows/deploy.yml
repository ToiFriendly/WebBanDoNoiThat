name: CI/CD Deploy to Ubuntu VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

env:
  APP_DIR: /root/webbandonoithat
  BACKEND_IMAGE_NAME: webbandonoithat-backend
  FRONTEND_IMAGE_NAME: webbandonoithat-frontend

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set Docker image names
        run: |
          DOCKER_USER="$(echo "${{ secrets.DOCKERHUB_USERNAME }}" | xargs)"

          if [ -z "$DOCKER_USER" ]; then
            echo "Missing DOCKERHUB_USERNAME secret." >&2
            exit 1
          fi

          echo "DOCKER_USER=$DOCKER_USER" >> "$GITHUB_ENV"
          echo "BACKEND_IMAGE=$DOCKER_USER/${{ env.BACKEND_IMAGE_NAME }}" >> "$GITHUB_ENV"
          echo "FRONTEND_IMAGE=$DOCKER_USER/${{ env.FRONTEND_IMAGE_NAME }}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Ubuntu VPS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Prepare remote deployment directory
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script_stop: true
          script: |
            mkdir -p "${{ env.APP_DIR }}/backend"

      - name: Upload compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: docker-compose.yml
          target: ${{ env.APP_DIR }}

      - name: Deploy containers
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script_stop: true
          script: |
            set -eu

            cat > "${{ env.APP_DIR }}/.env" <<EOF
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            IMAGE_TAG=${{ github.sha }}
            EOF

            cat > "${{ env.APP_DIR }}/backend/.env" <<'EOF'
            ${{ secrets.BACKEND_ENV_FILE }}
            EOF

            printf '%s\n' "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            cd "${{ env.APP_DIR }}"
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -af
            docker compose ps
